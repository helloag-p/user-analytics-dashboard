<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Analytics Demo</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f8fafc;
            color: #1e293b;
        }

        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 12px;
        }

        p {
            color: #64748b;
            margin-bottom: 40px;
            font-size: 18px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            font-size: 16px;
            transition: 0.2s;
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .info {
            margin-top: 30px;
            padding: 16px;
            border-radius: 10px;
            background: #eff6ff;
            color: #1e40af;
            font-size: 15px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>📊 User Analytics Demo</h1>

        <p>
            Interact with this page to generate analytics events.
            Every page view and click is automatically tracked.
        </p>

        <div class="card">

            <h2>Sample E-commerce Actions</h2>

            <div class="buttons">
                <button>🛒 Buy Now</button>
                <button>📖 Learn More</button>
                <button>📞 Contact Us</button>
                <button>❤️ Add to Wishlist</button>
            </div>

            <div class="info">
                <strong>Demo:</strong> Open the Analytics Dashboard in another tab and click these buttons to see
                sessions, user journeys, and heatmap updates in real time.
            </div>

        </div>

    </div>

    <script src="./tracker.js"></script>

</body>
</html>
